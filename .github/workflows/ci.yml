name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: rustdesk
          POSTGRES_PASSWORD: rustdesk
          POSTGRES_DB: rustdesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        run: npm ci
        working-directory: ./api

      - name: Run Backend Tests
        run: npm test -- --forceExit --passWithNoTests
        working-directory: ./api
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: rustdesk
          DB_PASS: rustdesk
          DB_NAME: rustdesk_test
          NODE_ENV: test

  test-frontend:
    name: 🧪 Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Web dependencies
        run: npm ci
        working-directory: ./web

      - name: Run Frontend Tests
        run: npm run test -- --run
        working-directory: ./web

  build-web:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest
    needs: [test-frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Web dependencies
        run: npm ci
        working-directory: ./web

      - name: Build Frontend
        run: npm run build
        working-directory: ./web
        env:
          VITE_API_URL: /api/v1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: web/dist/
          retention-days: 7
