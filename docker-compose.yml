version: '3.8'

# ==============================================================================
# Infraestrutura da Plataforma RustDesk
# Conforme specs: sistema (hbbs/hbbr), API Server, DB, Cache, IDP
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # Servidor de ID / ID Server (hbbs)
  # Funcionalidade: NAT hole punching, conexão, registro
  # ----------------------------------------------------------------------------
  hbbs:
    image: rustdesk/rustdesk-server:latest
    container_name: hbbs
    command: hbbs -r hbbr.empresa.com:21117 -k _
    environment:
      - RELAY=hbbr.empresa.com
      - ENCRYPTED_ONLY=1  # Requisito REQ-S-010: E2E Criptografado obrigatório
    volumes:
      - ./data/rustdesk-data:/root
    network_mode: host # Rustdesk Server recomenda network host por performance de UDP
    extra_hosts:
      - "hbbr.empresa.com:127.0.0.1"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep hbbs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ----------------------------------------------------------------------------
  # Servidor de Relay (hbbr)
  # Funcionalidade: Relay fallback de tráfego
  # ----------------------------------------------------------------------------
  hbbr:
    image: rustdesk/rustdesk-server:latest
    container_name: hbbr
    command: hbbr -k _
    environment:
      - ENCRYPTED_ONLY=1
    volumes:
      - ./data/rustdesk-data:/root
    network_mode: host
    extra_hosts:
      - "hbbr.empresa.com:127.0.0.1"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep hbbr || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ----------------------------------------------------------------------------
  # Proxy Reverso com TLS (Nginx) - REQ-S-001, REQ-NF-033
  # Porta 80 → redirect HTTPS | Porta 443 → TLS 1.2+
  # ----------------------------------------------------------------------------
  load-balancer:
    image: nginx:alpine
    container_name: load_balancer
    ports:
      - "80:80"    # Redirect HTTP → HTTPS
      - "443:443"  # HTTPS com TLS 1.2+ (REQ-S-001)
      - "3000:443" # Mapear 3000 -> 443 para o smoke-test da API (via HTTPS)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certs:/etc/nginx/certs:ro          # Certificados TLS (Let's Encrypt)
      - ./data/certbot/www:/var/www/certbot:ro     # ACME challenge
    depends_on:
      api-server:
        condition: service_healthy
      web:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------------------------
  # Certbot — gerenciamento automático de certificados Let's Encrypt
  # ----------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - ./data/certs:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"

  # ----------------------------------------------------------------------------
  # API Server (NestJS) / Address Book
  # Responsável por: Portal, Controle de Dispositivos e Address Book
  # REQ-NF-033: Deploy sem downtime via healthcheck + rolling update
  # ----------------------------------------------------------------------------
  api-server:
    image: node:20-alpine
    working_dir: /app
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - REDIS_HOST=redis-cache
      - KEYCLOAK_URL=http://keycloak:8080
      - REQUIRE_MFA=true  # REQ-F-015 / REQ-S-004: MFA obrigatório
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - ./api:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install --include=dev && npm run build && npm run start:prod"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first  # Zero-downtime

  # ----------------------------------------------------------------------------
  # Frontend (React/Vite)
  # ----------------------------------------------------------------------------
  web:
    image: node:20-alpine
    container_name: web_portal
    working_dir: /app
    volumes:
      - ./web:/app
    environment:
      - VITE_API_URL=/api
    command: sh -c "npm install && npm run dev -- --host"
    restart: unless-stopped
    ports:
      - "5173:5173"

  # ----------------------------------------------------------------------------
  # Banco de Dados (PostgreSQL 16)
  # ----------------------------------------------------------------------------
  postgres-db:
    image: postgres:16-alpine
    container_name: pg_db
    environment:
      - POSTGRES_USER=empresa_admin
      - POSTGRES_PASSWORD=super_secret_db_pass
      - POSTGRES_DB=rustdesk_platform
    volumes:
      - ./data/pg-data:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - postgres-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U empresa_admin -d rustdesk_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432" # Bloqueio externo garantido (REQ-S-008)

  # ----------------------------------------------------------------------------
  # Cache (Redis 7) - Sessões da API e filas
  # ----------------------------------------------------------------------------
  redis-cache:
    image: redis:7-alpine
    container_name: redis_cache
    volumes:
      - ./data/redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Identity Provider (Keycloak)
  # SSO, MFA e RBAC
  # REQ-F-015: MFA configurado via Admin Console (ver keycloak-config/mfa-policy.md)
  # ----------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak_idp
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin_secret
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://pg_db:5432/keycloak
      - KC_DB_USERNAME=empresa_admin
      - KC_DB_PASSWORD=super_secret_db_pass
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_HEALTH_ENABLED=true
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e \"GET /health/live HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; cat <&3 | grep -q \"200 OK\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------------------------
  # Servidor de Relay 2 (hbbr-2) - REQ-E-002: múltiplos relays
  # ----------------------------------------------------------------------------
  hbbr-2:
    image: rustdesk/rustdesk-server:latest
    container_name: hbbr_2
    command: hbbr -k _
    environment:
      - ENCRYPTED_ONLY=1
    volumes:
      - ./data/rustdesk-data-2:/root
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep hbbr || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ----------------------------------------------------------------------------
  # Banco de Dados Réplica (PostgreSQL 16) - REQ-E-004
  # ----------------------------------------------------------------------------
  postgres-replica:
    image: postgres:16-alpine
    container_name: pg_replica
    environment:
      - POSTGRES_USER=empresa_admin
      - POSTGRES_PASSWORD=super_secret_db_pass
      - POSTGRES_DB=rustdesk_platform
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "127.0.0.1:5434:5432"

networks:
  default:
    name: rustdesk_network

volumes:
  api-data:
  pg-data:
  redis-data:
  rustdesk-data:
  rustdesk-data-2:
